<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Hub | عالم الأفلام</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">Cinema<span>Hub</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن فيلمك المفضل...">
            </div>
        </div>
    </header>

    <div class="container">
        <section class="filter-bar">
            <button class="filter-btn active" data-category="الكل">الكل</button>
            <button class="filter-btn" data-category="أكشن">أكشن</button>
            <button class="filter-btn" data-category="دراما">دراما</button>
            <button class="filter-btn" data-category="رعب">رعب</button>
            <button class="filter-btn" data-category="خيال علمي">خيال علمي</button>
        </section>

        <main class="movie-grid" id="movieGrid">
            </main>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <img id="modalImg" src="" alt="">
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <div class="tags">
                        <span id="modalRating"></span>
                        <span id="modalYear"></span>
                        <span id="modalCategory" style="background: #444; padding: 2px 8px; border-radius: 4px;"></span>
                    </div>
                    <p id="modalDesc"></p>
                    <button class="watch-btn">مشاهدة الآن</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
